<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PesaSmart - Kenya Personal Finance</title>
  <meta name="theme-color" content="#D4A853">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%230A0A0B' width='100' height='100' rx='20'/><text x='50' y='65' font-size='50' text-anchor='middle' fill='%23D4A853' font-family='serif'>K</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --bg:#0A0A0B; --bg2:#111113; --bg3:#18181C; --bg4:#1F1F25; --border:rgba(255,255,255,0.07); --border-h:rgba(255,255,255,0.15);
      --gold:#D4A853; --gold-l:#E8C27A; --gold-d:rgba(212,168,83,0.14); --green:#4CAF7D; --green-d:rgba(76,175,125,0.14);
      --red:#E57373;   --red-d:rgba(229,115,115,0.14); --blue:#5B8DEF;  --blue-d:rgba(91,141,239,0.12);
      --text:#F0EDE8;  --text2:#A8A4A0; --text3:#5E5A56; --r:14px; --rs:9px; --sh:0 8px 32px rgba(0,0,0,0.45); --nav-h:60px;
    }
    body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;overflow-x:hidden;-webkit-tap-highlight-color:transparent;}
    .app{min-height:100vh;background:var(--bg);position:relative;}
    .app::before{content:'';position:fixed;top:-150px;right:-150px;width:500px;height:500px;background:radial-gradient(circle,rgba(212,168,83,0.055) 0%,transparent 70%);pointer-events:none;z-index:0;}
    
    /* TOP NAV */
    .topnav{position:fixed;top:0;left:0;right:0;height:var(--nav-h);background:rgba(10,10,11,0.92);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:50;}
    .topnav::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 0%,rgba(212,168,83,0.25) 50%,transparent 100%);}
    .hamburger{display:flex;flex-direction:column;justify-content:center;gap:5px;width:38px;height:38px;cursor:pointer;padding:6px;border-radius:8px;background:none;border:none;transition:background 0.2s;flex-shrink:0;}
    .hamburger:hover{background:var(--bg3);}
    .ham-line{height:1.5px;background:var(--text2);border-radius:99px;transform-origin:center;transition:all 0.3s cubic-bezier(0.4,0,0.2,1);}
    .hamburger.open .ham-line:nth-child(1){transform:translateY(6.5px) rotate(45deg);background:var(--gold);}
    .hamburger.open .ham-line:nth-child(2){opacity:0;transform:scaleX(0);}
    .hamburger.open .ham-line:nth-child(3){transform:translateY(-6.5px) rotate(-45deg);background:var(--gold);}
    .nav-logo{display:flex;align-items:center;gap:9px;cursor:pointer;}
    .nav-logo-icon{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--gold),#A8720F);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#0A0A0B;box-shadow:0 3px 12px rgba(212,168,83,0.3);font-family:'Playfair Display',serif;}
    .nav-logo-text{font-family:'Playfair Display',serif;font-size:17px;font-weight:600;letter-spacing:-0.2px;}
    .nav-right{display:flex;align-items:center;gap:6px;}
    .nav-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text2);border-radius:8px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;transition:all 0.2s;padding:0;}
    .nav-btn:hover{background:var(--bg4);color:var(--text);}
    .nav-btn.active{color:var(--gold);border-color:var(--gold);}
    .nav-add-btn{display:flex;align-items:center;gap:6px;background:linear-gradient(135deg,var(--gold),#A8720F);color:#0A0A0B;border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;font-family:'Outfit',sans-serif;cursor:pointer;box-shadow:0 3px 12px rgba(212,168,83,0.25);transition:all 0.2s;}
    .nav-add-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(212,168,83,0.35);}

    /* DRAWER */
    .drawer-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);z-index:60;animation:fadeIn 0.2s ease;}
    .drawer{position:fixed;top:0;left:0;bottom:0;width:270px;background:var(--bg2);border-right:1px solid var(--border);z-index:70;display:flex;flex-direction:column;transform:translateX(-100%);transition:transform 0.32s cubic-bezier(0.4,0,0.2,1);box-shadow:8px 0 48px rgba(0,0,0,0.5);}
    .drawer.open{transform:translateX(0);}
    .drawer-logo{padding:20px 22px 22px;border-bottom:1px solid var(--border);}
    .drawer-logo-row{display:flex;align-items:center;justify-content:space-between;}
    .drawer-close{background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px;padding:4px 8px;border-radius:6px;transition:all 0.2s;}
    .drawer-close:hover{color:var(--text);background:var(--bg3);}
    .drawer-nav{flex:1;overflow-y:auto;padding:16px 12px;}
    .drawer-section-label{font-size:9px;text-transform:uppercase;letter-spacing:1.8px;color:var(--text3);padding:0 10px;margin-bottom:6px;}
    .drawer-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:var(--rs);cursor:pointer;transition:all 0.18s;color:var(--text2);font-size:13.5px;font-weight:400;border:1px solid transparent;margin-bottom:2px;}
    .drawer-item:hover{background:var(--bg3);color:var(--text);}
    .drawer-item.active{background:var(--gold-d);color:var(--gold);border-color:rgba(212,168,83,0.18);font-weight:500;}
    .drawer-item-icon{font-size:15px;width:20px;text-align:center;}
    .drawer-divider{height:1px;background:var(--border);margin:12px 0;}
    .drawer-footer{padding:16px 22px;border-top:1px solid var(--border);}
    .user-pill{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--rs);background:var(--bg3);}
    .user-ava{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--gold),#A8720F);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#0A0A0B;flex-shrink:0;}
    .user-name{font-size:12px;font-weight:500;color:var(--text);}
    .user-badge{font-size:10px;color:var(--text3);}

    /* PAGE CONTENT */
    .page-wrap{padding-top:calc(var(--nav-h) + 20px);padding-bottom:40px;padding-left:16px;padding-right:16px;position:relative;z-index:1;max-width:1200px;margin:0 auto;}
    .page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
    .page-title{font-family:'Playfair Display',serif;font-size:26px;font-weight:600;letter-spacing:-0.4px;line-height:1.2;}
    .page-sub{font-size:12px;color:var(--text3);margin-top:3px;}

    /* BUTTONS */
    .btn{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:var(--rs);border:none;cursor:pointer;font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;transition:all 0.2s;white-space:nowrap;}
    .btn-primary{background:linear-gradient(135deg,var(--gold),#A8720F);color:#0A0A0B;box-shadow:0 3px 12px rgba(212,168,83,0.22);}
    .btn-primary:hover{transform:translateY(-1px);box-shadow:0 7px 20px rgba(212,168,83,0.32);}
    .btn-ghost{background:var(--bg3);color:var(--text2);border:1px solid var(--border);}
    .btn-ghost:hover{border-color:var(--border-h);color:var(--text);background:var(--bg4);}
    .btn-sm{padding:6px 11px;font-size:12px;}
    .btn-icon{padding:8px;border-radius:var(--rs);background:var(--bg3);border:1px solid var(--border);color:var(--text2);cursor:pointer;}
    .btn-icon:hover{background:var(--bg4);color:var(--text);}
    .btn-icon:disabled{opacity:0.5;cursor:not-allowed;}

    /* CARDS */
    .card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:20px;position:relative;overflow:hidden;}
    .card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.07),transparent);}
    .gap{margin-bottom:18px;}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
    .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
    .grid4{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
    .sec-title{font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:12px;}

    /* HERO */
    .hero{background:linear-gradient(140deg,#1A1508 0%,#0D0D0B 70%);border:1px solid rgba(212,168,83,0.18);border-radius:var(--r);padding:22px 24px;position:relative;overflow:hidden;}
    .bal-label{font-size:10px;color:var(--gold);text-transform:uppercase;letter-spacing:2px;margin-bottom:5px;}
    .bal-amt{font-family:'Playfair Display',serif;font-size:36px;font-weight:700;background:linear-gradient(135deg,#F0EDE8 35%,var(--gold-l));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-2px;line-height:1;margin-bottom:4px;}
    .bal-sub{font-size:11px;color:var(--text3);}
    .hero-stats{display:flex;gap:20px;margin-top:16px;padding-top:16px;border-top:1px solid rgba(255,255,255,0.055);flex-wrap:wrap;}
    .hs-l{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px;}
    .hs-v{font-size:16px;font-weight:600;font-family:'Playfair Display',serif;}

    /* STAT CARDS */
    .stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;transition:all 0.2s;overflow:hidden;position:relative;}
    .stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.06),transparent);}
    .stat-card:hover{border-color:var(--border-h);transform:translateY(-1px);}
    .stat-ico{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;margin-bottom:8px;}
    .stat-l{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px;}
    .stat-v{font-family:'Playfair Display',serif;font-size:18px;font-weight:600;letter-spacing:-0.3px;}

    /* TRANSACTIONS */
    .tx-list{display:flex;flex-direction:column;gap:1px;}
    .tx-row{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--rs);transition:background 0.14s;cursor:default;}
    .tx-row:hover{background:var(--bg3);}
    .tx-ico{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
    .tx-inf{flex:1;min-width:0;}
    .tx-nm{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .tx-mt{font-size:11px;color:var(--text3);margin-top:1px;}
    .tx-amt{font-size:14px;font-weight:600;font-family:'Playfair Display',serif;letter-spacing:-0.3px;white-space:nowrap;}
    .tx-btns{display:flex;gap:3px;opacity:0;transition:opacity 0.14s;}
    .tx-row:hover .tx-btns{opacity:1;}
    .icon-btn{background:none;border:none;cursor:pointer;padding:5px 6px;border-radius:6px;font-size:13px;color:var(--text3);transition:all 0.14s;font-family:'Outfit',sans-serif;}
    .icon-btn.e:hover{color:var(--blue);background:var(--blue-d);}
    .icon-btn.d:hover{color:var(--red);background:var(--red-d);}

    /* PAGINATION */
    .pagination-wrap{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding:8px 10px;background:var(--bg3);border-radius:var(--rs);flex-wrap:wrap;gap:8px;}
    .page-info{font-size:11px;color:var(--text3);}
    .page-controls{display:flex;gap:4px;align-items:center;}

    /* PROGRESS */
    .prog-track{height:5px;background:var(--bg4);border-radius:99px;overflow:hidden;}
    .prog-fill{height:100%;border-radius:99px;transition:width 0.65s cubic-bezier(0.4,0,0.2,1);}

    /* BUDGET ITEMS */
    .bud-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:var(--rs);background:var(--bg3);margin-bottom:6px;transition:background 0.15s;}
    .bud-item:hover{background:var(--bg4);}
    .bud-ico{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
    .bud-info{flex:1;min-width:0;}
    .bud-name{font-size:13px;font-weight:500;margin-bottom:5px;}
    .bud-bar-wrap{display:flex;align-items:center;gap:8px;}
    .bud-meta{font-size:11px;color:var(--text3);white-space:nowrap;}
    .bud-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
    .bud-pct{font-size:11px;font-weight:600;}
    .bud-remain{font-size:10px;}
    .bud-acts{display:flex;gap:3px;opacity:0;transition:opacity 0.14s;}
    .bud-item:hover .bud-acts{opacity:1;}

    /* GOALS */
    .goal-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:16px;transition:all 0.2s;}
    .goal-card:hover{border-color:var(--border-h);transform:translateY(-2px);}

    /* MODAL */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(10px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn 0.2s;}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes slideUp{from{opacity:0;transform:translateY(20px) scale(0.97)}to{opacity:1;transform:none}}
    .modal{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:24px 26px;width:100%;max-width:400px;box-shadow:var(--sh);animation:slideUp 0.24s cubic-bezier(0.34,1.5,0.64,1);max-height:90vh;overflow-y:auto;}
    .modal-wide{max-width:560px;}
    .modal-title{font-family:'Playfair Display',serif;font-size:19px;font-weight:600;margin-bottom:16px;}
    .fg{margin-bottom:12px;}
    .fl{display:block;font-size:10px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:5px;}
    .fi,.fs{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:10px 12px;color:var(--text);font-family:'Outfit',sans-serif;font-size:14px;outline:none;transition:all 0.2s;appearance:none;text-align:center;}
    .fi:focus,.fs:focus{border-color:var(--gold);background:var(--bg4);box-shadow:0 0 0 3px var(--gold-d);}
    .fi::placeholder{color:var(--text3);}
    .fs option{background:var(--bg3);}
    .tgl-grp{display:flex;gap:6px;margin-bottom:14px;}
    .tgl-btn{flex:1;padding:8px;border-radius:var(--rs);border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.2s;}
    .tgl-btn.income.a{background:var(--green-d);border-color:var(--green);color:var(--green);}
    .tgl-btn.expense.a{background:var(--red-d);border-color:var(--red);color:var(--red);}
    .m-acts{display:flex;gap:8px;margin-top:18px;}

    /* PIN INPUT */
    .pin-grid {display: flex; gap: 12px; justify-content: center; margin: 20px 0;}
    .pin-box {width: 50px; height: 55px; border: 1px solid var(--border); border-radius: 10px; background: var(--bg3); color: var(--text); font-size: 24px; text-align: center; font-family: 'Outfit', sans-serif; font-weight: 600;}
    .pin-box:focus { border-color: var(--gold); background: var(--bg4); outline: none; }
    
    /* Checkbox Toggle */
    .check-toggle{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;}
    .check-toggle input{position:absolute;opacity:0;width:0;height:0;}
    .check-mark{width:34px;height:18px;background:var(--bg4);border-radius:99px;position:relative;transition:background 0.2s;}
    .check-mark::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;background:var(--text3);border-radius:50%;transition:all 0.2s;}
    .check-toggle input:checked + .check-mark{background:var(--green);}
    .check-toggle input:checked + .check-mark::after{transform:translateX(16px);background:white;}
    .check-label{font-size:12px;color:var(--text2);}

    /* CHIPS */
    .chip{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:99px;font-size:10px;font-weight:500;}
    .cg{background:var(--green-d);color:var(--green);}.cr{background:var(--red-d);color:var(--red);}.co{background:var(--gold-d);color:var(--gold);}

    /* ALERTS */
    .alert-item{display:flex;align-items:flex-start;gap:8px;padding:10px;border-radius:var(--rs);margin-bottom:5px;}
    .alert-warn{background:rgba(212,168,83,0.1);border-left:3px solid var(--gold);}
    .alert-danger{background:var(--red-d);border-left:3px solid var(--red);}
    .alert-ico{font-size:14px;margin-top:1px;}
    .alert-inf{flex:1;}
    .alert-t{font-size:12px;font-weight:600;margin-bottom:1px;}
    .alert-m{font-size:10px;color:var(--text3);}

    /* DATA PAGE */
    .data-sec{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:12px;}
    .data-sec-t{font-size:14px;font-weight:600;margin-bottom:4px;}
    .data-sec-s{font-size:11px;color:var(--text3);margin-bottom:12px;}
    .data-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);}
    .data-row:last-child{border-bottom:none;}

    /* EMPTY */
    .empty{text-align:center;padding:36px 16px;}
    .empty-ico{font-size:36px;margin-bottom:8px;}
    .empty-t{font-size:14px;font-weight:500;margin-bottom:4px;}

    /* DONUT */
    .donut-wrap{display:flex;align-items:center;gap:16px;}
    .leg-item{display:flex;align-items:center;gap:6px;padding:3px 0;border-bottom:1px solid var(--border);}
    .leg-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
    .leg-l{font-size:11px;color:var(--text2);flex:1;}
    .leg-v{font-size:11px;font-weight:600;}

    /* HEATMAP */
    .heatmap-container{display:flex;flex-direction:column;gap:3px;}
    .heatmap-row{display:flex;gap:2px;align-items:center;}
    .heatmap-day-label{width:18px;font-size:8px;color:var(--text3);text-align:right;padding-right:3px;}
    .heatmap-cell{width:9px;height:9px;border-radius:2px;background:var(--bg4);transition:all 0.15s;cursor:pointer;}
    .heatmap-cell:hover{transform:scale(1.4);border:1px solid var(--text);}
    .heatmap-cell.inc-l1{background:rgba(76,175,125,0.25);}.heatmap-cell.inc-l2{background:rgba(76,175,125,0.5);}.heatmap-cell.inc-l3{background:rgba(76,175,125,0.75);}.heatmap-cell.inc-l4{background:var(--green);}
    .heatmap-cell.exp-l1{background:rgba(229,115,115,0.25);}.heatmap-cell.exp-l2{background:rgba(229,115,115,0.5);}.heatmap-cell.exp-l3{background:rgba(229,115,115,0.75);}.heatmap-cell.exp-l4{background:var(--red);}
    .heatmap-month-label{font-size:8px;color:var(--text3);margin-bottom:1px;}

    /* MISC */
    .fb{display:flex;align-items:center;justify-content:space-between;}
    .notif{position:fixed;bottom:20px;right:20px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--rs);padding:10px 14px;font-size:13px;color:var(--text);z-index:300;box-shadow:var(--sh);display:flex;align-items:center;gap:8px;animation:slideUp 0.28s ease;}
    .notif.success{border-color:var(--green);}.notif.error{border-color:var(--red);}.notif.info{border-color:var(--gold);}
    .fade-in{animation:fadeIn 0.3s ease;}
    .fi-hidden{display:none;}
    .color-dot{width:22px;height:22px;border-radius:50%;cursor:pointer;transition:transform 0.15s;flex-shrink:0;}
    .color-dot:hover{transform:scale(1.15);}
    .page-indicator{display:none;}
    
    ::-webkit-scrollbar{width:3px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:99px;}

    /* Responsive */
    @media (min-width: 768px) {
      .grid2{grid-template-columns:1fr 1fr;}
      .grid3{grid-template-columns:repeat(3,1fr);}
      .grid4{grid-template-columns:repeat(4,1fr);}
      .page-wrap{padding-left:28px;padding-right:28px;}
      .hero{padding:26px 30px;}
      .bal-amt{font-size:40px;}

    }
  </style>
</head>
<body>
  <div class="app">
    <nav class="topnav">

        <button class="hamburger" id="hamburger" aria-label="Menu"><div class="ham-line"></div><div class="ham-line"></div><div class="ham-line"></div></button>

      <div class="drawer-nav" id="drawerNav"></div>
      <div class="drawer-footer"><div class="user-pill"><div class="user-ava">PS</div><div><div class="user-name">PesaSmart</div><div class="user-badge">🟢 Offline Mode</div></div></div></div>
    </aside>
    <main class="page-wrap">
      <div class="page-header"><div><div class="page-title" id="pageTitle">Dashboard</div><div class="page-sub" id="pageSub">Your financial overview</div></div><div id="pageActions" style="display:flex;gap:8px;"></div></div>
      <div id="pageContent"></div>
    </main>
    <div class="notif" id="notif" style="display:none;"></div>
    <div id="modalContainer"></div>
    <input type="file" accept=".json" id="importFile" class="fi-hidden">
  </div>

  <script>if ('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js').catch(err => console.error('SW Fail', err)); }</script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script>
    const escapeHtml = (unsafe) => { if(!unsafe) return ""; return String(unsafe).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;"); };
    const DEFAULT_CATEGORIES = [
      {id:"salary", name:"Salary", emoji:"💼", color:"#4CAF7D", budget:0, type:"income"}, {id:"freelance", name:"Freelance", emoji:"💻", color:"#5B8DEF", budget:0, type:"income"}, {id:"business", name:"Business", emoji:"🏢", color:"#9B7EDE", budget:0, type:"income"}, {id:"other_inc", name:"Other Income", emoji:"💰", color:"#8A8A8A", budget:0, type:"income"},
      {id:"food", name:"Food & Groceries", emoji:"🛒", color:"#E8A838", budget:15000, type:"expense"}, {id:"transport", name:"Transport", emoji:"🚌", color:"#5B8DEF", budget:6000, type:"expense"}, {id:"housing", name:"Rent & Utilities", emoji:"🏠", color:"#9B7EDE", budget:35000, type:"expense"}, {id:"mobile", name:"Airtime & Data", emoji:"📱", color:"#4CAF7D", budget:2000, type:"expense"}, {id:"health", name:"Health", emoji:"🏥", color:"#E57373", budget:5000, type:"expense"}, {id:"entertainment", name:"Entertainment", emoji:"🎭", color:"#F06292", budget:4000, type:"expense"}, {id:"other_exp", name:"Other Expense", emoji:"📦", color:"#8A8A8A", budget:5000, type:"expense"},
    ];
    const PAYMENT_METHODS = ["M-Pesa","Cash","Bank Transfer","Card","Cheque"];
    const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    const DAYS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
    const GOAL_EMOJIS = ["🎯","🏠","🚗","✈️","💻","🌄","🛡️","💍","📚","🏋️","🐄","🏦","👨‍👩‍👧","🎓","🌍","⚽","🎵","🌿"];
    const CAT_EMOJIS  = ["🛒","🚌","🏠","📱","🏥","🎭","🏦","📚","💼","🍽️","☕","🐄","🎮","🛍️","💇","🐕","🚿","⚡","🌐","🎓","🎬","🏋️","🌿","✂️","🔧"];
    const PALETTE     = ["#E8A838","#5B8DEF","#9B7EDE","#4CAF7D","#E57373","#F06292","#26C6DA","#AB8E5E","#8A8A8A","#FF8A65","#4DB6AC","#7986CB"];
    const GOAL_COLORS = ["#4CAF7D","#D4A853","#5B8DEF","#9B7EDE","#E57373","#F06292","#26C6DA","#FF8A65"];
    const ITEMS_PER_PAGE = 50;
    const BACKUP_INTERVAL = 30; 
    const NAV = [ {id:"dashboard", label:"Dashboard", icon:"⬛"}, {id:"transactions", label:"Transactions", icon:"↕"}, {id:"budget", label:"Budget", icon:"📊"}, {id:"goals", label:"Goals", icon:"🎯"}, {id:"data", label:"Import / Export", icon:"💾"}, ];
    const PAGE_META = { dashboard:{title:"Dashboard", sub:"Your financial overview"}, transactions:{title:"Transactions", sub:"All income & expenses"}, budget:{title:"Budget Tracker", sub:"Manage your spending categories"}, goals:{title:"Savings Goals", sub:"Track your milestones"}, data:{title:"Data Manager", sub:"Backup · Restore · Export"}, };
    const fmt = n => "KES " + Math.abs(n).toLocaleString("en-KE",{maximumFractionDigits:0});
    const mask = n => "KES ****";
    const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);
    const todayStr = () => new Date().toISOString().slice(0,10);

    let state = { 
        page: "dashboard", txs: [], goals: [], cats: [...DEFAULT_CATEGORIES], drawerOpen: false, notif: null, editingTx: null, editingCat: null, filter: "all", search: "", sortBy: "date", currentPage: 1,
        // Security State
        security: { enabled: false, locked: true, hash: null }
    };
    let notifTimeout = null;

    // Simple Hash Function (Client-side, for obfuscation)
    const simpleHash = (str) => {
        let hash = 0;
        for (let i = 0; i < str.length; i++) {
            const char = str.charCodeAt(i);
            hash = ((hash<<5)-hash)+char;
            hash = hash & hash;
        }
        return hash.toString(16);
    };

    function loadState() { 
        try { 
            const tr = localStorage.getItem("ps_txs"); if (tr) state.txs = JSON.parse(tr); 
            const gr = localStorage.getItem("ps_goals"); if (gr) state.goals = JSON.parse(gr); 
            const cr = localStorage.getItem("ps_cats"); if (cr) { const loadedCats = JSON.parse(cr); state.cats = loadedCats.map(c => ({...c, type: c.type || 'expense'})); } 
            const sr = localStorage.getItem("ps_sec"); if (sr) { state.security = JSON.parse(sr); state.security.locked = state.security.enabled; } // Lock on load if enabled
            checkBackupStatus(); 
        } catch(e) { console.error("Load error", e); } 
    }
    function saveState() { 
        try { 
            localStorage.setItem("ps_txs", JSON.stringify(state.txs)); 
            localStorage.setItem("ps_goals", JSON.stringify(state.goals)); 
            localStorage.setItem("ps_cats", JSON.stringify(state.cats)); 
            localStorage.setItem("ps_sec", JSON.stringify(state.security));
        } catch(e) { notify("Storage full! Please export backup.", "error"); } 
    }
    function checkBackupStatus() { const lastBackup = localStorage.getItem("ps_last_backup"); if (!lastBackup) { localStorage.setItem("ps_last_backup", todayStr()); return; } const lastDate = new Date(lastBackup); const today = new Date(); const diffTime = Math.abs(today - lastDate); const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); if (diffDays > BACKUP_INTERVAL) { showBackupReminder(); } }
    function showBackupReminder() { showModal(`<div class="overlay"><div class="modal"><div class="modal-title">⏰ Backup Reminder</div><div style="font-size:14px; color:var(--text2); margin-bottom:20px;">It has been over ${BACKUP_INTERVAL} days since your last backup. Please export a JSON backup.</div><div class="m-acts"><button class="btn btn-ghost" style="flex:1;" data-close-modal>Later</button><button class="btn btn-primary" style="flex:1;" id="backupNow">Backup Now</button></div></div></div>`); }
    
    function processRecurringTransactions() { 
        const today = new Date(); const currentMonth = today.getMonth(); const currentYear = today.getFullYear(); let newTxs = []; 
        state.txs.forEach(tx => { if(tx.recurring === 'monthly') { const txDate = new Date(tx.date); const txMonth = txDate.getMonth(); const txYear = txDate.getFullYear(); const existsThisMonth = state.txs.some(t => t.recurringId === tx.id && new Date(t.date).getMonth() === currentMonth && new Date(t.date).getFullYear() === currentYear); const isOld = (currentYear > txYear) || (currentYear === txYear && currentMonth > txMonth); if(isOld && !existsThisMonth) { let nextDue = new Date(txDate); nextDue.setFullYear(currentYear); nextDue.setMonth(currentMonth); if(nextDue.getMonth() !== currentMonth) nextDue.setDate(0); const newTx = { ...tx, id: uid(), date: nextDue.toISOString().slice(0, 10), recurringId: tx.id, note: "Auto-generated recurring" }; newTxs.push(newTx); } } }); 
        if(newTxs.length > 0) { state.txs = [...state.txs, ...newTxs]; saveState(); notify(`Processed ${newTxs.length} recurring transaction(s)`, "info"); } 
    }
    
    function notify(msg, type = "success") { clearTimeout(notifTimeout); state.notif = {msg, type}; renderNotif(); notifTimeout = setTimeout(() => { state.notif = null; renderNotif(); }, 3000); }
    function navigate(id) { state.page = id; state.drawerOpen = false; render(); }
    function getCatMap() { return Object.fromEntries(state.cats.map(c => [c.id, c])); }
    
    function exportPDF(txs, cats, title = "PesaSmart – Transactions") { if (!window.jspdf || !window.jspdf.jsPDF) { notify("PDF library loading...", "info"); return; } const {jsPDF} = window.jspdf; const doc = new jsPDF({orientation:"portrait",unit:"mm",format:"a4"}); const W = 210, P = 14; let y = 20; const catMap = getCatMap(); doc.setFillColor(212,168,83); doc.rect(0,0,W,15,"F"); doc.setFontSize(10); doc.setTextColor(10,10,11); doc.setFont("helvetica","bold"); doc.text("PESASMART", P, 9); doc.setFont("helvetica","normal"); doc.text(new Date().toLocaleDateString("en-KE"), W-P, 9, {align:"right"}); y = 25; doc.setFontSize(18); doc.setTextColor(30, 30, 30); doc.setFont("helvetica","bold"); doc.text(title, P, y); y += 10; const inc = txs.filter(t => t.type === "income").reduce((s,t) => s + t.amount, 0); const exp = txs.filter(t => t.type === "expense").reduce((s,t) => s + t.amount, 0); doc.setFontSize(9); doc.setTextColor(80, 80, 80); doc.setFont("helvetica","normal"); doc.text(`Income: ${fmt(inc)} | Exp: ${fmt(exp)} | Net: ${fmt(inc-exp)}`, P, y); y += 10; const cols = {date:P, desc:45, cat:105, amt:196}; doc.setFillColor(245, 245, 245); doc.rect(P-2, y-3, W-P*2+4, 7, "F"); doc.setFontSize(8); doc.setTextColor(50, 50, 50); doc.setFont("helvetica","bold"); ["DATE","DESCRIPTION","CATEGORY","AMOUNT"].forEach((h,i) => { const x = [cols.date, cols.desc, cols.cat, cols.amt][i]; const align = i === 3 ? "right" : "left"; doc.text(h, x, y, {align}); }); y += 6; [...txs].sort((a,b) => new Date(b.date) - new Date(a.date)).forEach((tx,i) => { if (y > 275) {doc.addPage(); y = 20;} if (i % 2 === 1) { doc.setFillColor(250, 250, 250); doc.rect(P-2, y-3, W-P*2+4, 6, "F"); } doc.setFontSize(8); doc.setTextColor(40, 40, 40); doc.setFont("helvetica","normal"); doc.text(tx.date, cols.date, y); doc.text(tx.name.length > 40 ? tx.name.slice(0,39)+"…" : tx.name, cols.desc, y); const cat = catMap[tx.category] || {name:"Other"}; doc.text(cat.name, cols.cat, y); doc.text((tx.type === "income" ? "+" : "-") + fmt(tx.amount), cols.amt, y, {align:"right"}); y += 6; }); doc.save(`PesaSmart_${todayStr()}.pdf`); localStorage.setItem("ps_last_backup", todayStr()); }
    function exportJSON(txs, goals, cats) { const blob = new Blob([JSON.stringify({meta:{app:"PesaSmart",version:"3.5",exported:new Date().toISOString()},transactions:txs,goals,categories:cats},null,2)], {type:"application/json"}); const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `PesaSmart_Backup_${todayStr()}.json`; a.click(); localStorage.setItem("ps_last_backup", todayStr()); notify("Backup saved", "success"); }
    function importJSON(file, onSuccess, onError) { const r = new FileReader(); r.onload = e => { try { const d = JSON.parse(e.target.result); if (!Array.isArray(d.transactions)) throw new Error(); onSuccess(d); } catch { onError("Invalid backup file."); } }; r.readAsText(file); }

    function render() { renderDrawer(); renderPage(); renderNotif(); updatePrivacyUI(); }
    function renderNotif() { const el = document.getElementById("notif"); if (!state.notif) { el.style.display = "none"; return; } el.style.display = "flex"; el.className = `notif ${state.notif.type}`; el.innerHTML = `<span>${state.notif.type === "success" ? "✓" : state.notif.type === "error" ? "✕" : "·"}</span>${escapeHtml(state.notif.msg)}`; }
    function renderDrawer() { const drawer = document.getElementById("drawer"); const backdrop = document.getElementById("drawerBackdrop"); const hamburger = document.getElementById("hamburger"); if (state.drawerOpen) { drawer.classList.add("open"); backdrop.style.display = "block"; hamburger.classList.add("open"); } else { drawer.classList.remove("open"); backdrop.style.display = "none"; hamburger.classList.remove("open"); } document.getElementById("drawerNav").innerHTML = `<div class="drawer-section-label">Menu</div>${NAV.map(n => `<div class="drawer-item ${state.page === n.id ? "active" : ""}" data-page="${n.id}"><span class="drawer-item-icon">${n.icon}</span>${n.label}</div>`).join("")}<div class="drawer-divider"></div><div class="drawer-section-label">Security</div><div class="drawer-item" data-action="togglePrivacy"><span class="drawer-item-icon">${state.security.enabled ? "🔒" : "🔓"}</span>${state.security.enabled ? "Privacy On" : "Privacy Off"}</div><div class="drawer-divider"></div><div class="drawer-section-label">Quick Action</div><div class="drawer-item" data-action="addTx"><span class="drawer-item-icon">＋</span>Add Transaction</div><div class="drawer-item" data-action="exportJson"><span class="drawer-item-icon">💾</span>Backup JSON</div>`; }
    function renderPage() { const pm = PAGE_META[state.page]; document.getElementById("pageTitle").textContent = pm.title; document.getElementById("pageSub").textContent = pm.sub; document.getElementById("pageIndicator").innerHTML = `${NAV.find(n => n.id === state.page)?.icon} ${pm.title}`; const actions = document.getElementById("pageActions"); if (state.page === "transactions") actions.innerHTML = `<button class="btn btn-primary" data-action="addTx">＋ Add</button>`; else if (state.page === "budget") actions.innerHTML = `<button class="btn btn-primary">Budget: ${fmt(state.cats.filter(c => c.type === 'expense').reduce((s,c) => s + (c.budget || 0), 0))}/mo</button>`; else actions.innerHTML = ""; const content = document.getElementById("pageContent"); switch(state.page) { case "dashboard": content.innerHTML = renderDashboard(); break; case "transactions": content.innerHTML = renderTransactions(); break; case "budget": content.innerHTML = renderBudget(); break; case "goals": content.innerHTML = renderGoals(); break; case "data": content.innerHTML = renderData(); break; } }
    
    function updatePrivacyUI() {
        const icon = document.getElementById("privacyIcon");
        const btn = document.getElementById("privacyToggle");
        if (state.security.enabled) {
            btn.classList.add('active');
            icon.textContent = state.security.locked ? "🔒" : "👁️";
        } else {
            btn.classList.remove('active');
            icon.textContent = "👁️";
        }
    }

    function renderDashboard() { 
        const catMap = getCatMap(); 
        const inc = state.txs.filter(t => t.type === "income").reduce((s,t) => s + t.amount, 0); 
        const exp = state.txs.filter(t => t.type === "expense").reduce((s,t) => s + t.amount, 0); 
        const bal = inc - exp; 
        const isLocked = state.security.enabled && state.security.locked;

        const savRate = inc > 0 ? ((inc - exp) / inc * 100) : 0; 
        const catExp = state.cats.filter(c => c.type === 'expense').map(c => ({...c, spent: state.txs.filter(t => t.type === "expense" && t.category === c.id).reduce((s,t) => s + t.amount, 0)})).filter(c => c.spent > 0); 
        const recent = [...state.txs].sort((a,b) => new Date(b.date) - new Date(a.date)).slice(0,5); 
        const alerts = []; catExp.forEach(c => { const pct = c.budget > 0 ? (c.spent / c.budget) * 100 : 0; if (pct >= 100) alerts.push({ type: 'danger', title: `${escapeHtml(c.name)} Exceeded`, msg: `Spent ${fmt(c.spent)} of ${fmt(c.budget)}.`, icon: '🚨' }); else if (pct >= 80) alerts.push({ type: 'warn', title: `${escapeHtml(c.name)} Warning`, msg: `At ${pct.toFixed(0)}% of budget.`, icon: '⚠️' }); }); 
        if (state.txs.length === 0) { return `<div class="fade-in"><div class="card" style="text-align:center;padding:60px 16px;"><div style="font-size:48px;margin-bottom:12px;">🌱</div><div style="font-family:'Playfair Display',serif;font-size:20px;font-weight:600;margin-bottom:8px;">Welcome to PesaSmart</div><div style="font-size:13px;color:var(--text3);margin-bottom:20px;">Input your first transaction to begin.</div><button class="btn btn-primary" data-action="addTx">＋ Add First Transaction</button></div></div>`; } 
        return `<div class="fade-in"><div class="hero gap"><div class="bal-label">Total Balance</div><div class="bal-amt">${isLocked ? "KES ****" : fmt(bal)}</div><div class="bal-sub">${new Date().toLocaleDateString("en-KE",{weekday:"short",month:"short",day:"numeric"})}</div><div class="hero-stats"><div><div class="hs-l">Income</div><div class="hs-v" style="color:var(--green);">${isLocked ? "****" : fmt(inc)}</div></div><div><div class="hs-l">Expenses</div><div class="hs-v" style="color:var(--red);">${isLocked ? "****" : fmt(exp)}</div></div><div><div class="hs-l">Savings</div><div class="hs-v" style="color:var(--gold);">${isLocked ? "**%" : savRate.toFixed(0)+"%"}</div></div></div></div><div class="grid4 gap">${renderStatCard("Transactions", state.txs.length, "📊", "rgba(91,141,239,0.14)")}${renderStatCard("Daily Avg", isLocked ? "****" : fmt(exp/30), "📅", "rgba(229,115,115,0.14)")}${renderStatCard("Goals", state.goals.length, "🎯", "rgba(212,168,83,0.14)")}${renderStatCard("Net", isLocked ? "****" : fmt(Math.max(bal,0)), "💰", "rgba(76,175,125,0.14)")}</div>${alerts.length > 0 ? `<div class="card gap"><div class="sec-title">Alerts</div>${alerts.map(a => `<div class="alert-item alert-${a.type}"><div class="alert-ico">${a.icon}</div><div class="alert-inf"><div class="alert-t">${a.title}</div><div class="alert-m">${a.msg}</div></div></div>`).join('')}</div>` : ''}<div class="grid2 gap"><div class="card"><div class="sec-title">Spending</div>${catExp.length > 0 ? `<div class="donut-wrap">${renderDonutChart(catExp.map(c => ({ value: c.spent, color: c.color })), isLocked)}<div style="flex:1;">${catExp.slice(0,5).map(c => `<div class="leg-item"><div class="leg-dot" style="background:${c.color};"></div><div class="leg-l">${escapeHtml(c.name)}</div><div class="leg-v">${isLocked ? "****" : fmt(c.spent)}</div></div>`).join("")}</div></div>` : `<div class="empty"><div class="empty-t">No expenses yet</div></div>`}</div><div class="card"><div class="sec-title">Recent</div>${recent.length > 0 ? `<div class="tx-list">${recent.map(tx => { const cat = catMap[tx.category] || {emoji:"💼",color:"#8A8A8A"}; return `<div class="tx-row"><div class="tx-ico" style="background:${cat.color}22;">${cat.emoji}</div><div class="tx-inf"><div class="tx-nm">${isLocked ? "••••••••" : escapeHtml(tx.name)}</div><div class="tx-mt">${tx.date}</div></div><div class="tx-amt" style="color:${tx.type === "income" ? "var(--green)" : "var(--red)"};">${isLocked ? "****" : (tx.type === "income" ? "+" : "-") + fmt(tx.amount)}</div></div>`; }).join("")}</div>` : ``}</div></div><div class="card gap"><div class="fb" style="margin-bottom:12px;"><div class="sec-title" style="margin:0;">Activity (Volume)</div></div>${isLocked ? `<div style="color:var(--text3);text-align:center;padding:20px;">🔒 Unlock to view details</div>` : renderSmartHeatmap()}</div></div>`; 
    }
    function renderStatCard(label, value, icon, bg) { return `<div class="stat-card"><div class="stat-ico" style="background:${bg};">${icon}</div><div class="stat-l">${label}</div><div class="stat-v">${value}</div></div>`; }
    function renderDonutChart(data, locked = false) { 
        const size = 100; 
        if (locked) return `<div style="width:${size}px;height:${size}px;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:10px;">🔒</div>`;
        const total = data.reduce((s,d) => s + d.value, 0); if (total === 0) return `<div style="width:${size}px;height:${size}px;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:10px;">No Data</div>`; let cum = 0; const R = 38, cx = size/2, cy = size/2, C = 2 * Math.PI * R; const segs = data.map(d => { const f = total > 0 ? d.value / total : 0; const dash = f * C, offset = C - cum * C; cum += f; return {...d, dash, offset}; }); return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="transform:rotate(-90deg);"><circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="#1F1F25" stroke-width="14"/>${segs.map(s => `<circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="${s.color}" stroke-width="14" stroke-dasharray="${s.dash} ${C}" stroke-dashoffset="${s.offset}"/>`).join("")}</svg>`; 
    }
    function renderSmartHeatmap() { const today = new Date(); today.setHours(0,0,0,0); const days = []; for(let i = 0; i < 90; i++) { const d = new Date(today); d.setDate(d.getDate() - i); days.push(d); } days.reverse(); const txMap = {}; state.txs.forEach(tx => { if(!txMap[tx.date]) txMap[tx.date] = {net: 0, volume: 0}; const amt = tx.type === 'income' ? tx.amount : -tx.amount; txMap[tx.date].net += amt; txMap[tx.date].volume += tx.amount; }); const maxVolume = Math.max(1000, Math.max(...Object.values(txMap).map(d => d.volume))); const firstDay = days[0]; const startDayIndex = firstDay.getDay(); let weeks = []; let currentWeek = new Array(startDayIndex).fill(null); days.forEach(d => { const dStr = d.toISOString().slice(0,10); currentWeek.push({date: dStr, ...txMap[dStr]}); if(currentWeek.length === 7) { weeks.push(currentWeek); currentWeek = []; } }); if(currentWeek.length > 0) weeks.push(currentWeek); return `<div class="heatmap-container"><div class="heatmap-row"><div style="width:16px;"></div>${weeks.map((w, i) => { if(i === 0) return `<div class="heatmap-month-label" style="width:9px;">${MONTHS[new Date(w.find(x => x)?.date).getMonth()]}</div>`; const prevDate = new Date(weeks[i-1][6]?.date || weeks[i-1].find(x=>x)?.date); const currDate = new Date(w[6]?.date || w.find(x=>x)?.date); if(currDate.getMonth() !== prevDate.getMonth()) return `<div class="heatmap-month-label" style="width:9px;">${MONTHS[currDate.getMonth()]}</div>`; return `<div style="width:11px;"></div>`; }).join('')}</div>${[0,1,2,3,4,5,6].map(dayIndex => `<div class="heatmap-row"><div class="heatmap-day-label">${dayIndex % 2 === 1 ? DAYS[dayIndex] : ''}</div>${weeks.map(week => { const cell = week[dayIndex]; if(!cell) return `<div class="heatmap-cell" style="visibility:hidden;"></div>`; let colorClass = ''; if(cell.volume > 0) { const level = Math.min(4, Math.ceil((cell.volume / maxVolume) * 4)); if(cell.net >= 0) colorClass = `inc-l${level}`; else colorClass = `exp-l${level}`; } return `<div cla     document.addEventListener("click", e => {

      // Privacy Logic

          return;
      }
      if (e.target.closest("[data-action='disablePrivacy']")) {
          // Simple disable for now (in real app, would need verification)
          // For this demo, we act as "Forgot PIN" resets it.
          state.security.enabled = false;
          state.security.hash = null;
          state.security.locked = false;
          saveState();
          closeModal();
          notify("Privacy Disabled", "info");
          render();
          return;
      }

      if (e.target.closest("[data-action='togglePrivacy']")) { 
          if(state.security.enabled) {
               state.security.locked = !state.security.locked;
               if(state.security.locked) notify("Data Locked", "info");
               saveState();
               render();
          } else {
              showPrivacyModal();
          }
          return;
      }

      if (e.target.closest("[data-action='addTx']")) { showTxModal(); return; }
      if (e.target.closest("[data-action='exportJson']")) { exportJSON(state.txs, state.goals, state.cats); state.drawerOpen = false; render(); return; }
      if (e.target.closest("[data-action='openExportModal']")) { showExportModal(); return; }
      if (e.target.closest("#triggerExport")) {
          const start = document.getElementById("exportStart").value; const end = document.getElementById("exportEnd").value;
          if(!start || !end) { notify("Select dates", "error"); return; }
          const filtered = state.txs.filter(t => t.date >= start && t.date <= end);
          if(filtered.length === 0) { notify("No data", "info"); return; }
          exportPDF(filtered, state.cats, `${start} to ${end}`);
          closeModal();
          return;
      }
      if (e.target.closest("#backupNow")) { exportJSON(state.txs, state.goals, state.cats); closeModal(); return; }
      if (e.target.closest("[data-action='addCat']")) { showCatModal(); return; }
      if (e.target.closest("[data-action='addGoal']")) { showGoalModal(); return; }
      if (e.target.closest("[data-action='importJson']") || e.target.closest("#importBtn")) { document.getElementById("importFile").click(); return; }
      if (e.target.closest("[data-filter]")) { state.filter = e.target.closest("[data-filter]").dataset.filter; state.currentPage = 1; render(); return; }
      if (e.target.closest("[data-page='prev']")) { if (state.currentPage > 1) { state.currentPage--; render(); } return; }
      if (e.target.closest("[data-page='next']")) { const filtered = state.txs.filter(t => state.filter === "all" || t.type === state.filter).filter(t => t.name.toLowerCase().includes(state.search.toLowerCase())); const totalPages = Math.ceil(filtered.length / ITEMS_PER_PAGE); if (state.currentPage < totalPages) { state.currentPage++; render(); } return; }
      if (e.target.closest("[data-edit-tx]")) { const id = e.target.closest("[data-edit-tx]").dataset.editTx; const tx = state.txs.find(t => t.id === id); if (tx) { state.editingTx = tx; showTxModal(tx); } return; }
      if (e.target.closest("[data-del-tx]")) { const id = e.target.closest("[data-del-tx]").dataset.delTx; state.txs = state.txs.filter(t => t.id !== id); saveState(); notify("Deleted", "info"); render(); return; }
      if (e.target.closest("[data-edit-cat]")) { const id = e.target.closest("[data-edit-cat]").dataset.editCat; const cat = state.cats.find(c => c.id === id); if (cat) { state.editingCat = cat; showCatModal(cat); } return; }
      if (e.target.closest("[data-del-cat]")) { const id = e.target.closest("[data-del-cat]").dataset.delCat; if (state.txs.some(t => t.category === id)) notify("In use", "error"); else { state.cats = state.cats.filter(c => c.id !== id); saveState(); notify("Removed", "info"); render(); } return; }
      if (e.target.closest("[data-del-goal]")) { const id = e.target.closest("[data-del-goal]").dataset.delGoal; state.goals = state.goals.filter(g => g.id !== id); saveState(); notify("Removed", "info"); render(); return; }
      if (e.target.closest("[data-contribute-goal]")) { const btn = e.target.closest("[data-contribute-goal]"); const id = btn.dataset.contributeGoal; const amt = parseFloat(btn.dataset.amount); state.goals = state.goals.map(g => g.id === id ? {...g, current: Math.min(g.current + amt, g.target)} : g); saveState(); notify(`${fmt(amt)} added`, "success"); render(); return; }
      if (e.target.closest("[data-set-type]")) { const type = e.target.closest("[data-set-type]").dataset.setType; document.getElementById("txType").value = type; document.querySelectorAll(".tgl-btn.income").forEach(b => b.classList.toggle("a", type === "income")); document.querySelectorAll(".tgl-btn.expense").forEach(b => b.classList.toggle("a", type === "expense")); const filteredCats = state.cats.filter(c => c.type === type); document.getElementById("txCat").innerHTML = filteredCats.map(c => `<option value="${c.id}">${c.emoji} ${escapeHtml(c.name)}</option>`).join(""); return; }
      if (e.target.closest("[data-set-cat-type]")) { const type = e.target.closest("[data-set-cat-type]").dataset.setCatType; document.getElementById("catType").value = type; document.querySelectorAll(".tgl-btn.income").forEach(b => b.classList.toggle("a", type === "income")); document.querySelectorAll(".tgl-btn.expense").forEach(b => b.classList.toggle("a", type === "expense")); return; }
      if (e.target.closest("[data-set-emoji]")) { const emoji = e.target.closest("[data-set-emoji]").dataset.setEmoji; document.getElementById("catEmoji").value = emoji; document.querySelectorAll("[data-set-emoji]").forEach(b => { b.style.borderColor = b.dataset.setEmoji === emoji ? "var(--gold)" : "var(--border)"; b.style.background = b.dataset.setEmoji === emoji ? "var(--gold-d)" : "var(--bg3)"; }); return; }
      if (e.target.closest("[data-set-color]")) { const color = e.target.closest("[data-set-color]").dataset.setColor; document.getElementById("catColor").value = color; document.querySelectorAll("[data-set-color]").forEach(d => d.style.borderColor = d.dataset.setColor === color ? "white" : "transparent"); return; }
      if (e.target.closest("[data-set-goal-emoji]")) { const emoji = e.target.closest("[data-set-goal-emoji]").dataset.setGoalEmoji; document.getElementById("goalEmoji").value = emoji; document.querySelectorAll("[data-set-goal-emoji]").forEach(b => { b.style.borderColor = b.dataset.setGoalEmoji === emoji ? "var(--gold)" : "var(--border)"; b.style.background = b.dataset.setGoalEmoji === emoji ? "var(--gold-d)" : "var(--bg3)"; }); return; }
      if (e.target.closest("[data-set-goal-color]")) { const color = e.target.closest("[data-set-goal-color]").dataset.setGoalColor; document.getElementById("goalColor").value = color; document.querySelectorAll("[data-set-goal-color]").forEach(d => d.style.borderColor = d.dataset.setGoalColor === color ? "white" : "transparent"); return; }
      if (e.target.closest("#saveTx")) { const name = document.getElementById("txName").value.trim(); const amount = parseFloat(document.getElementById("txAmount").value); if (!name || !amount) return; const recurringCheck = document.getElementById("txRecurring"); const recurringVal = recurringCheck && recurringCheck.checked ? 'monthly' : 'none'; const tx = { id: document.getElementById("txId").value || uid(), name, amount, type: document.getElementById("txType").value, category: document.getElementById("txCat").value, date: document.getElementById("txDate").value, method: document.getElementById("txMethod").value, note: document.getElementById("txNote").value.trim(), recurring: recurringVal }; const existing = state.txs.find(t => t.id === tx.id); if (existing) state.txs = state.txs.map(t => t.id === tx.id ? tx : t); else state.txs.unshift(tx); saveState(); notify(existing ? "Updated" : "Added", "success"); closeModal(); render(); return; }
      if (e.target.closest("#saveCat")) { const name = document.getElementById("catName").value.trim(); if (!name) return; const cat = { id: document.getElementById("catId").value || uid(), name, emoji: document.getElementById("catEmoji").value, color: document.getElementById("catColor").value, budget: parseFloat(document.getElementById("catBudget").value) || 0, type: document.getElementById("catType").value }; const existing = state.cats.find(c => c.id === cat.id); if (existing) state.cats = state.cats.map(c => c.id === cat.id ? cat : c); else state.cats.push(cat); saveState(); notify("Saved", "success"); closeModal(); render(); return; }
      if (e.target.closest("#saveGoal")) { const name = document.getElementById("goalName").value.trim(); const target = parseFloat(document.getElementById("goalTarget").value); if (!name || !target) return; state.goals.push({ id: uid(), name, emoji: document.getElementById("goalEmoji").value, target, current: parseFloat(document.getElementById("goalCurrent").value) || 0, color: document.getElementById("goalColor").value }); saveState(); closeModal(); notify("Goal created", "success"); render(); return; }
    });

    // PIN Input Logic
    document.addEventListener("input", e => {
        if (e.target.closest("[data-pin-input]")) {
            const input = e.target;
            if (input.value.length === 1) {
                const next = input.nextElementSibling;
                if (next && next.classList.contains('pin-box')) next.focus();
                else {
                    // All filled
                    const boxes = document.querySelectorAll('[data-pin-input]');
                    let pin = "";
                    boxes.forEach(b => pin += b.value);
                  
                    if (pin.length === 4) {
                          if (simpleHash(pin) === state.security.hash) {
                              state.security.locked = false;
                              saveState();
                              closeModal();
                              render();
                          } else {
                              notify("Incorrect PIN", "error");
                              boxes.forEach(b => b.value = "");
                              boxes[0].focus();
                          }
                    }
                }
            }
        }
      
      if (e.target.closest("[data-bind='search']")) { state.search = e.target.value; state.currentPage = 1; render(); }
      if (e.target.closest("[data-bind='sortBy']")) { state.sortBy = e.target.value; state.currentPage = 1; render(); }
    });

    document.getElementById("importFile").addEventListener("change", e => { 
      const file = e.target.files[0]; 
      if (!file) return; 
      importJSON(file, d => { 
        state.txs = d.transactions || []; 
        state.goals = d.goals || []; 
        if (d.categories) state.cats = d.categories; 
        saveState(); 
        notify("Imported successfully", "success"); 
        render(); 
      }, err => notify(err, "error")); 
      e.target.value = ""; 
    });

    loadState();
    processRecurringTransactions();
    checkIntent();
    render();
  </script>
</body>
</html>
